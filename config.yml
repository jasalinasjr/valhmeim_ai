--- # Valheim AI Configuration

## ------ General ------
VALHEIM_WINDOW_TITLE: "Valheim"
MODEL_SAVE: "valheim_ppo"
YOLO_MODEL_PATH: "valheim_custom_v3.pt"
DEVICE: "cuda"
TEMP_THRESHOLD: 90
VRAM_RESERVE: 450
MAX_BURST_STEPS: 4000
MOUSE_SENSITIVITY: 56

## ------ Capture Region ------
capture_region:
  top: 40
  left: 0
  width: 1280
  height: 880

## ------ Reward Weights (All configurable here) ------
REWARD_WEIGHTS:
  time_penalty: -0.01
  wood_bonus: 2.0
  kill_bonus: 8.0
  health_gain_bonus: 4.0
  health_loss_penalty: -3.0
  enemy_visible_penalty: -1.5
  curiosity_scale: 0.4
  action_look_down_bonus: 0.6      # New: bonus for looking down
  potential_scale: 1.0             # Multiplier for potential-based shaping

## ------ Actions ------
action_map:
  0: ["w", 0.25]
  1: ["s", 0.25]
  2: ["a", 0.25]
  3: ["d", 0.25]
  4: ["space", 0.15]
  5: ["left", 0.3]
  6: ["right", 0.3]
  7: ["e", 0.2]
  8: ["shift", 0.15]
  9: ["tab", 0.05]
  10: ["x", 0.05]
  11: ["1", 0.15]
  12: ["2", 0.15]
  13: ["3", 0.15]
  14: ["4", 0.15]
  15: ["5", 0.15]
  16: ["6", 0.15]
  17: ["7", 0.15]
  18: ["8", 0.15]
  19: [null, 0.1]
  20: ["mouse_left", "MOUSE_SENSITIVITY"]
  21: ["mouse_right", "MOUSE_SENSITIVITY"]
  22: ["mouse_up", "MOUSE_SENSITIVITY"]
  23: ["mouse_down", "MOUSE_SENSITIVITY"]

## ------ Resources & Enemies ------
items:
  - wood
  - raspberry
  - stone
  - flint
  - resin
  - leather scraps
  - mushroom
  - raw meat
  - deer hide
  - bone fragments

enemies:
  - greyling
  - boar
  - deer
  - neck
  - greydwarf
  - troll
  - wolf
  - skeleton
  - enemy

## ------ PPO Hyperparameters ------
PPO_PARAMS:
  policy: "CnnPolicy"
  verbose: 1
  learning_rate: 0.0003
  n_steps: 1024
  batch_size: 64
  n_epochs: 10
  ent_coef: 0.01
  tensorboard_log: "./valheim_ppo_logs/"
