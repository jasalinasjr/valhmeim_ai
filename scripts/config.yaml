--- # Valheim AI Configuration - Updated for YOLO11n + Optimized Rewards

## ------ General ------
VALHEIM_WINDOW_TITLE: "Valheim"
MODEL_SAVE: "valheim_ppo"
YOLO_MODEL_PATH: "valheim_custom_v3.pt"
DEVICE: "cuda"
TEMP_THRESHOLD: 90          # Slightly lower for safety on 970M
VRAM_RESERVE: 500
MAX_BURST_STEPS: 3000       # Shorter bursts = safer on Colab/laptop
MOUSE_SENSITIVITY: 56

## ------ Capture Region ------
capture_region:
  top: 40
  left: 0
  width: 1280
  height: 880

## ------ Reward Weights (Optimized) ------
REWARD_WEIGHTS:
  time_penalty: -0.012
  wood_bonus: 3.5           # Higher because model struggles with wood
  stone_bonus: 3.2
  kill_bonus: 10.0
  health_gain_bonus: 5.0
  health_loss_penalty: -4.5
  enemy_visible_penalty: -1.3
  curiosity_scale: 0.32     # Slightly reduced to not overpower other signals
  action_look_down_bonus: 0.8   # Stronger incentive for looking down

## ------ Actions ------
action_map:
  0: ["w", 0.25]
  1: ["s", 0.25]
  2: ["a", 0.25]
  3: ["d", 0.25]
  4: ["space", 0.15]
  5: ["left", 0.3]
  6: ["right", 0.3]
  7: ["e", 0.2]
  8: ["shift", 0.15]
  9: [null, 0.01]
  10: ["x", 0.05]
  11: ["1", 0.15]
  12: ["2", 0.15]
  13: ["3", 0.15]
  14: ["4", 0.15]
  15: ["5", 0.15]
  16: ["6", 0.15]
  17: ["7", 0.15]
  18: ["8", 0.15]
  19: [null, 0.01]
  20: ["mouse_left", "MOUSE_SENSITIVITY"]
  21: ["mouse_right", "MOUSE_SENSITIVITY"]
  22: ["mouse_up", "MOUSE_SENSITIVITY"]
  23: ["mouse_down", "MOUSE_SENSITIVITY"]

## ------ Resources & Enemies (MUST match YOLO class names exactly) ------
items:
  - Wood
  - Raspberries
  - Blueberries
  - Stone
  - Flint
  - Resin
  - Leather Scraps
  - Mushroom
  - Boar Meat
  - Deer Meat
  - Deer Hide
  - Bone Fragments
  - Neck Tail
  - Feathers
  - Honey

enemies:
  - Greyling
  - Boar
  - Deer
  - Neck
  - Greydwarf
  - Greydwarf Brute
  - Greydwarf Shaman
  - Skeleton
  - Rancid Remains
  - Bear
  - Troll
  - Wolf

## ------ PPO Hyperparameters ------
PPO_PARAMS:
  policy: "CnnPolicy"
  verbose: 1
  learning_rate: 0.0003
  n_steps: 1024
  batch_size: 64
  n_epochs: 10
  ent_coef: 0.01
  tensorboard_log: "./valheim_ppo_logs/"
